<script id="animationScript">
    const feedbackEl = document.getElementById('feedbackIcon');
    const logoEl = document.getElementById('stimulerLogo');

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // Phase timing
    let SEPARATED_MS    = 800;
    let FUSE_MS         = 1100;
    let TO_LOGO_MS      = 850;   // star scales down → swap → logo scales up
    let LOGO_HOLD_MS    = 1600;
    let LOGO_COLLAPSE_MS = 450;  // logo scales down
    let EMERGE_MS       = 1100;  // all 3 icons emerge from center with rotation

    const SWAP_AT = 0.5; // fraction of phase duration at which to hide/show the swap

    function buildPhases() {
      return [
        { name: 'separated',     duration: SEPARATED_MS },
        { name: 'rotateAndFuse', duration: FUSE_MS },
        { name: 'toLogo',        duration: TO_LOGO_MS },
        { name: 'logoHold',      duration: LOGO_HOLD_MS },
        { name: 'logoCollapse',  duration: LOGO_COLLAPSE_MS },
        { name: 'emergeAll',     duration: EMERGE_MS }
      ];
    }
    let PHASES = buildPhases();

    let phaseIdx = 0;
    let phaseStart = performance.now();
    let swapped = false;
    let isPaused = false;

    function setTrans(el, props, duration, easing = 'cubic-bezier(0.4, 0, 0.2, 1)') {
      el.style.transition = props.map(p => `${p} ${duration}ms ${easing}`).join(', ');
    }

    function enterPhase(idx) {
      const p = PHASES[idx];
      phaseStart = performance.now();

      switch (p.name) {
        case 'separated':
          // Feedback at center, logo hidden
          setTrans(feedbackEl, ['transform', 'opacity'], 0);
          setTrans(logoEl, ['transform', 'opacity'], 0);
          feedbackEl.style.transform = 'translateX(0px) rotate(0deg) scale(1)';
          feedbackEl.style.opacity = '1';
          logoEl.style.transform = 'scale(0)';
          logoEl.style.opacity = '0';
          break;

        case 'rotateAndFuse':
          // Feedback rotates in place
          setTrans(feedbackEl, ['transform'], p.duration, 'cubic-bezier(0.45, 0.05, 0.55, 0.95)');
          feedbackEl.style.transform = 'translateX(0px) rotate(360deg) scale(1)';
          break;

        case 'toLogo':
          // rAF drives: feedback scales 1→0, swap at midpoint, logo scales 0→1
          feedbackEl.style.transition = 'none';
          logoEl.style.transition = 'none';
          swapped = false;
          break;

        case 'logoHold':
          break;

        case 'logoCollapse':
          // rAF drives: logo scales 1→0
          logoEl.style.transition = 'none';
          break;

        case 'emergeAll':
          // Snap feedback to scale 0, logo hidden
          feedbackEl.style.transition = 'none';
          feedbackEl.style.transform = 'translateX(0px) rotate(0deg) scale(0)';
          feedbackEl.style.opacity = '1';
          logoEl.style.transition = 'none';
          logoEl.style.transform = 'scale(0)';
          logoEl.style.opacity = '0';

          // Force reflow
          feedbackEl.offsetHeight;

          // Feedback emerges with full rotation back to scale 1
          setTrans(feedbackEl, ['transform'], p.duration, 'cubic-bezier(0.4, 0, 0.2, 1)');
          feedbackEl.style.transform = 'translateX(0px) rotate(360deg) scale(1)';
          break;
      }
    }

    enterPhase(0);


    function tick(now) {
      if (isPaused) {
        requestAnimationFrame(tick);
        return;
      }
      const p = PHASES[phaseIdx];
      const elapsed = now - phaseStart;
      const t = Math.min(elapsed / p.duration, 1);

      if (p.name === 'toLogo') {
        if (t < SWAP_AT) {
          // First half: feedback scales 1 → 0
          const sub = t / SWAP_AT;
          const scale = 1 - easeInOutCubic(sub);
          feedbackEl.style.transform = `translateX(0px) rotate(0deg) scale(${scale})`;
        } else {
          // At swap: hide feedback, show logo at scale 0
          if (!swapped) {
            swapped = true;
            feedbackEl.style.transform = 'translateX(0px) rotate(0deg) scale(0)';
            feedbackEl.style.opacity = '0';
            logoEl.style.opacity = '1';
          }
          // Second half: logo scales 0 → 1
          const sub = (t - SWAP_AT) / (1 - SWAP_AT);
          const scale = easeInOutCubic(sub);
          logoEl.style.transform = `scale(${scale})`;
        }
      }

      if (p.name === 'logoCollapse') {
        // Logo scales 1 → 0
        const scale = 1 - easeInOutCubic(t);
        logoEl.style.transform = `scale(${scale})`;
      }

      if (t >= 1) {
        phaseIdx = (phaseIdx + 1) % PHASES.length;
        enterPhase(phaseIdx);
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // Playback controls
    function pauseAnim() {
      if (isPaused) return;
      isPaused = true;
      [feedbackEl, logoEl].forEach(el => {
        const ct = getComputedStyle(el).transform;
        const co = getComputedStyle(el).opacity;
        el.style.transition = 'none';
        if (ct !== 'none') el.style.transform = ct;
        el.style.opacity = co;
      });
    }

    function playAnim() {
      if (!isPaused) return;
      isPaused = false;
      phaseStart = performance.now();
      enterPhase(phaseIdx);
    }

    function replayAnim() {
      isPaused = false;
      phaseIdx = 0;
      phaseStart = performance.now();
      enterPhase(0);
    }

    window.playAnim = playAnim;
    window.pauseAnim = pauseAnim;
    window.replayAnim = replayAnim;
  </script>
